<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PagerMonitor Inställningar</title>
    <link rel="stylesheet" href="/static/style.css?v=2">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&family=Fira+Code:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500;600&family=Inconsolata:wght@400;700&family=JetBrains+Mono:wght@400;500;800&family=Roboto+Mono:wght@400;500;700&family=Source+Code+Pro:wght@400;600;800&family=Space+Mono:wght@400;700&family=Ubuntu+Mono:wght@400;700&family=Courier+Prime:wght@400;700&family=Share+Tech+Mono&family=Anonymous+Pro:wght@400;700&family=VT323&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        // Apply theme immediately to prevent flickering
        (function () {
            const theme = localStorage.getItem('pagermonitor-theme') || 'dark';
            document.documentElement.setAttribute('data-theme', theme);

            const isCollapsed = localStorage.getItem('sidebar-collapsed') === 'true';
            if (isCollapsed) {
                document.addEventListener('DOMContentLoaded', () => {
                    document.getElementById('sidebar').classList.add('collapsed');
                });
            }
        })();

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('collapsed');
            localStorage.setItem('sidebar-collapsed', sidebar.classList.contains('collapsed'));
        }
    </script>
</head>

<body>
    <div class="app-layout">
        <nav class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-satellite-dish" style="font-size: 1.5rem; color: var(--accent);"></i>
                <div class="sidebar-logo">
                    <h1>Pager<span>Monitor</span></h1>
                    <p>POCSAG Monitor</p>
                </div>
            </div>

            <div class="sidebar-nav">
                <a href="/" class="nav-item">
                    <i class="fas fa-th-large"></i>
                    <span>Dashboard</span>
                </a>
                <a href="/aliases" class="nav-item">
                    <i class="fas fa-tag"></i>
                    <span>Alias</span>
                </a>
                <a href="/alerts" class="nav-item">
                    <i class="fas fa-bell"></i>
                    <span>Alerts</span>
                </a>
                <a href="/statistics" class="nav-item">
                    <i class="fas fa-chart-bar"></i>
                    <span>Statistics</span>
                </a>
                <a href="/settings" class="nav-item active">
                    <i class="fas fa-cog"></i>
                    <span>Settings</span>
                </a>
            </div>

            <div class="sidebar-footer">
                <button class="sidebar-toggle" onclick="toggleSidebar()" title="Toggle Menu">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
        </nav>

        <div class="main-content">
            <header>
                <h1><span class="highlight">Settings</span></h1>
                <p>Configure the system and SDR receivers</p>
            </header>

            <main>
                <div class="glass-panel form-container">
                    <div class="settings-tabs">
                        <button class="tab-trigger active" onclick="switchTab('radio')">SDR Receivers</button>
                        <button class="tab-trigger" onclick="switchTab('display')">Appearance & UI</button>
                    </div>

                    <!-- Tab: Radio (Multi-SDR Manager) -->
                    <div id="tab-radio" class="tab-content active">
                        <div id="sdrList" class="sdr-grid">
                            <!-- SDR Cards will be injected here -->
                        </div>

                        <div class="form-actions"
                            style="margin-top: 2rem; border-top: 1px solid var(--panel-border); padding-top: 1.5rem;">
                            <button type="button" class="primary-btn" onclick="addNewSDR()">+ Add new
                                receiver</button>
                        </div>
                    </div>

                    <!-- Tab: Display (Global) -->
                    <div id="tab-display" class="tab-content">
                        <form id="globalSettingsForm">
                            <div class="form-group">
                                <label for="theme">Theme</label>
                                <select id="theme" class="form-input"
                                    style="width: 100%; padding: 0.8rem 1rem; background: var(--input-bg); border: 1px solid var(--panel-border); border-radius: 6px; color: var(--text-primary); cursor: pointer;">
                                    <option value="dark">Dark Theme (Standard)</option>
                                    <option value="light">Light Theme</option>
                                </select>
                            </div>

                            <div class="row-group">
                                <div class="col">
                                    <div class="form-group">
                                        <label for="message_font">Font</label>
                                        <select id="message_font" name="message_font" class="form-input"
                                            style="width: 100%; padding: 0.8rem 1rem; background: var(--input-bg); border: 1px solid var(--panel-border); border-radius: 6px; color: var(--text-primary);">
                                            <option value="JetBrains Mono">JetBrains Mono</option>
                                            <option value="Fira Code">Fira Code</option>
                                            <option value="Inconsolata">Inconsolata</option>
                                            <option value="IBM Plex Mono">IBM Plex Mono</option>
                                            <option value="Roboto Mono">Roboto Mono</option>
                                            <option value="Source Code Pro">Source Code Pro</option>
                                            <option value="Space Mono">Space Mono</option>
                                            <option value="Ubuntu Mono">Ubuntu Mono</option>
                                            <option value="Courier Prime">Courier Prime</option>
                                            <option value="Share Tech Mono">Share Tech Mono (ANSI)</option>
                                            <option value="Anonymous Pro">Anonymous Pro</option>
                                            <option value="VT323">VT323 (Retro)</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="col">
                                    <div class="form-group">
                                        <label for="message_font_size_slider">Size (<span id="font_size_val">1.0</span>
                                            rem)</label>
                                        <input type="range" id="message_font_size_slider" min="0.5" max="2.0" step="0.1"
                                            value="1.0" style="width: 100%;">
                                        <input type="hidden" id="message_font_size" name="message_font_size"
                                            value="1.0">
                                    </div>
                                </div>
                            </div>

                            <div class="form-group">
                                <label>Preview</label>
                                <div id="fontPreview"
                                    style="padding: 1.5rem; background: rgba(0,0,0,0.2); border: 1px solid var(--panel-border); border-radius: 8px; min-height: 80px; display: flex; align-items: center; justify-content: center; overflow: hidden;">
                                    <span id="previewText">BRANDALARM: STORGATAN 1 - 12:45</span>
                                </div>
                            </div>

                            <div class="form-actions" style="margin-top: 1rem;">
                                <button type="submit" id="saveGlobalBtn" class="primary-btn">Save Appearance</button>
                            </div>
                        </form>
                    </div>

                    <div id="statusMessage" class="status-message"></div>
                </div>
            </main>
        </div>
    </div>

    <script>
        let currentSDRs = [];

        function switchTab(tabId) {
            document.querySelectorAll('.tab-trigger').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`.tab-trigger[onclick="switchTab('${tabId}')"]`).classList.add('active');
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            document.getElementById(`tab-${tabId}`).classList.add('active');
        }

        function loadGlobalSettings() {
            fetch('/api/settings')
                .then(res => res.json())
                .then(data => {
                    document.getElementById('message_font').value = data.message_font || 'JetBrains Mono';
                    if (data.message_font_size) {
                        document.getElementById('message_font_size').value = data.message_font_size;
                        document.getElementById('message_font_size_slider').value = data.message_font_size;
                        document.getElementById('font_size_val').innerText = data.message_font_size;
                    }
                    updatePreview();
                });
        }

        function loadSDRs() {
            fetch('/api/sdr')
                .then(res => res.json())
                .then(data => {
                    currentSDRs = data;
                    renderSDRList();
                });
        }

        function renderSDRList() {
            const list = document.getElementById('sdrList');
            if (currentSDRs.length === 0) {
                list.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: var(--text-secondary); padding: 2rem;">No receivers added yet.</p>';
                return;
            }

            list.innerHTML = currentSDRs.map(sdr => `
                <div class="glass-panel sdr-card ${sdr.enabled ? '' : 'disabled'}">
                    <div class="sdr-card-header">
                        <h3>${sdr.name}</h3>
                        <label class="switch">
                            <input type="checkbox" ${sdr.enabled ? 'checked' : ''} onchange="toggleSDR(${sdr.id}, this.checked)">
                            <span class="slider round"></span>
                        </label>
                    </div>
                    <div class="sdr-card-body">
                        <div class="sdr-info"><span>Frequency:</span> <strong>${sdr.frequency}</strong></div>
                        <div class="sdr-info"><span>Serial:</span> <strong>${sdr.device_serial || 'Default'}</strong></div>
                    </div>
                    <div class="sdr-card-actions">
                        <a href="/settings/sdr/${sdr.id}" class="secondary-btn" style="text-decoration: none; display: inline-block; text-align: center;">Manage Settings</a>
                    </div>
                </div>
            `).join('');
        }

        function addNewSDR() {
            const name = prompt('Enter name for the new receiver:');
            if (!name) return;

            fetch('/api/sdr', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: name, frequency: '169.8M' })
            })
                .then(res => res.json())
                .then(data => {
                    loadSDRs();
                });
        }

        function toggleSDR(id, enabled) {
            fetch(`/api/sdr/${id}/toggle`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ enabled })
            }).then(() => {
                showStatus('Receiver ' + (enabled ? 'activated' : 'deactivated'), 'success');
                loadSDRs();
            });
        }

        function showStatus(text, type) {
            const statusMsg = document.getElementById('statusMessage');
            statusMsg.innerText = text;
            statusMsg.className = `status-message ${type} show`;
            setTimeout(() => { statusMsg.classList.remove('show'); }, 5000);
        }

        // Global Settings Form
        document.getElementById('globalSettingsForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = document.getElementById('saveGlobalBtn');
            btn.disabled = true;

            const payload = {
                message_font: document.getElementById('message_font').value,
                message_font_size: document.getElementById('message_font_size').value
            };

            const themeVal = document.getElementById('theme').value;
            localStorage.setItem('pagermonitor-theme', themeVal);
            document.documentElement.setAttribute('data-theme', themeVal);

            fetch('/api/settings', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
                .then(res => res.json())
                .then(data => {
                    showStatus('Settings saved!', 'success');
                })
                .finally(() => btn.disabled = false);
        });

        const fontSelect = document.getElementById('message_font');
        const fontSlider = document.getElementById('message_font_size_slider');
        const fontSizeHidden = document.getElementById('message_font_size');
        const fontSizeValLabel = document.getElementById('font_size_val');
        const previewText = document.getElementById('previewText');

        function updatePreview() {
            const font = fontSelect.value;
            const size = fontSlider.value;
            fontSizeHidden.value = size;
            fontSizeValLabel.innerText = size;
            previewText.style.fontFamily = `'${font}', monospace`;
            previewText.style.fontSize = `${size}rem`;
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadGlobalSettings();
            loadSDRs();

            const currentTheme = localStorage.getItem('pagermonitor-theme') || 'dark';
            document.getElementById('theme').value = currentTheme;
            document.documentElement.setAttribute('data-theme', currentTheme);

            fontSelect.addEventListener('change', updatePreview);
            fontSlider.addEventListener('input', updatePreview);
        });
    </script>
</body>

</html>
