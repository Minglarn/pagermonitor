<!DOCTYPE html>
<html lang="sv">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PagerMonitor Inställningar</title>
    <link rel="stylesheet" href="/static/style.css?v=2">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&family=JetBrains+Mono:wght@400;600&family=Share+Tech+Mono&family=Anonymous+Pro:wght@400;700&family=VT323&family=Roboto+Mono:wght@400;600&family=Source+Code+Pro:wght@400;600&display=swap"
        rel="stylesheet">
    <script>
        // Apply theme immediately to prevent flickering
        (function () {
            const theme = localStorage.getItem('pagermonitor-theme') || 'dark';
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
</head>

<body>
    <div class="background-effects">
        <div class="glow glow-1"></div>
        <div class="glow glow-2"></div>
    </div>

    <div class="container">
        <nav class="top-nav">
            <a href="/" class="nav-link">Dashboard</a>
            <a href="/aliases" class="nav-link">Alias</a>
            <a href="/alerts" class="nav-link">Alerts</a>
            <a href="/settings" class="nav-link active">Inställningar</a>
        </nav>

        <header>
            <h1><span class="highlight">Inställningar</span></h1>
            <p>Konfigurera systemet och SDR-mottagaren</p>
        </header>

        <main>
            <div class="glass-panel form-container">
                <div class="settings-tabs">
                    <button class="tab-trigger active" onclick="switchTab('radio')">SDR-Mottagare</button>
                    <button class="tab-trigger" onclick="switchTab('display')">Utseende & UI</button>
                </div>

                <!-- Tab: Radio (Multi-SDR Manager) -->
                <div id="tab-radio" class="tab-content active">
                    <div id="sdrList" class="sdr-grid">
                        <!-- SDR Cards will be injected here -->
                    </div>

                    <div class="form-actions"
                        style="margin-top: 2rem; border-top: 1px solid var(--panel-border); padding-top: 1.5rem;">
                        <button type="button" class="primary-btn" onclick="openSDRModal()">+ Lägg till ny
                            mottagare</button>
                    </div>
                </div>

                <!-- Tab: Display (Global) -->
                <div id="tab-display" class="tab-content">
                    <form id="globalSettingsForm">
                        <div class="form-group">
                            <label for="theme">Färgtema</label>
                            <select id="theme" class="form-input"
                                style="width: 100%; padding: 0.8rem 1rem; background: var(--input-bg); border: 1px solid var(--panel-border); border-radius: 6px; color: var(--text-primary); cursor: pointer;">
                                <option value="dark">Mörkt tema (Standard)</option>
                                <option value="light">Ljust tema</option>
                            </select>
                        </div>

                        <div class="row-group">
                            <div class="col">
                                <div class="form-group">
                                    <label for="message_font">Typsnitt</label>
                                    <select id="message_font" name="message_font" class="form-input"
                                        style="width: 100%; padding: 0.8rem 1rem; background: var(--input-bg); border: 1px solid var(--panel-border); border-radius: 6px; color: var(--text-primary);">
                                        <option value="JetBrains Mono">JetBrains Mono</option>
                                        <option value="Share Tech Mono">Share Tech Mono (ANSI)</option>
                                        <option value="Anonymous Pro">Anonymous Pro</option>
                                        <option value="Roboto Mono">Roboto Mono</option>
                                        <option value="Source Code Pro">Source Code Pro</option>
                                        <option value="VT323">VT323 (Retro)</option>
                                    </select>
                                </div>
                            </div>
                            <div class="col">
                                <div class="form-group">
                                    <label for="message_font_size_slider">Storlek (<span id="font_size_val">1.0</span>
                                        rem)</label>
                                    <input type="range" id="message_font_size_slider" min="0.5" max="2.0" step="0.1"
                                        value="1.0" style="width: 100%;">
                                    <input type="hidden" id="message_font_size" name="message_font_size" value="1.0">
                                </div>
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Förhandsgranskning</label>
                            <div id="fontPreview"
                                style="padding: 1.5rem; background: rgba(0,0,0,0.2); border: 1px solid var(--panel-border); border-radius: 8px; min-height: 80px; display: flex; align-items: center; justify-content: center; overflow: hidden;">
                                <span id="previewText">BRANDALARM: STORGATAN 1 - 12:45</span>
                            </div>
                        </div>

                        <div class="form-actions" style="margin-top: 1rem;">
                            <button type="submit" id="saveGlobalBtn" class="primary-btn">Spara Utseende</button>
                        </div>
                    </form>
                </div>

                <div id="statusMessage" class="status-message"></div>
            </div>

            <!-- SDR Modal -->
            <div id="sdrModal" class="modal-overlay">
                <div class="glass-panel modal-content" style="max-width: 600px; width: 90%;">
                    <h2 id="modalTitle">Redigera Mottagare</h2>
                    <form id="sdrForm">
                        <input type="hidden" id="sdr_id" name="id">

                        <div class="form-group">
                            <label for="sdr_name">Namn / Beskrivning</label>
                            <input type="text" id="sdr_name" name="name" placeholder="T.ex. RIKS 1" required>
                        </div>

                        <div class="row-group">
                            <div class="col">
                                <div class="form-group">
                                    <label for="sdr_frequency">Frekvens (MHz)</label>
                                    <input type="text" id="sdr_frequency" name="frequency" placeholder="169.800M"
                                        required>
                                </div>
                            </div>
                            <div class="col">
                                <div class="form-group">
                                    <label for="sdr_device_serial">Device Serial</label>
                                    <input type="text" id="sdr_device_serial" name="device_serial"
                                        placeholder="00000101">
                                </div>
                            </div>
                        </div>

                        <div class="row-group">
                            <div class="col">
                                <div class="form-group">
                                    <label for="sdr_gain">Gain</label>
                                    <input type="text" id="sdr_gain" name="gain" placeholder="auto" value="auto">
                                </div>
                            </div>
                            <div class="col">
                                <div class="form-group">
                                    <label for="sdr_ppm">PPM Error</label>
                                    <input type="number" id="sdr_ppm" name="ppm_error" value="0">
                                </div>
                            </div>
                        </div>

                        <div class="settings-accordion">
                            <details>
                                <summary>Avancerade Signalinställningar</summary>
                                <div class="accordion-content">
                                    <div class="row-group">
                                        <div class="col">
                                            <div class="form-group">
                                                <label for="sdr_sr">Sample Rate (-s)</label>
                                                <input type="text" id="sdr_sr" name="sample_rate" value="22050">
                                            </div>
                                        </div>
                                        <div class="col">
                                            <div class="form-group">
                                                <label for="sdr_rr">Resample (-r)</label>
                                                <input type="text" id="sdr_rr" name="resample_rate" value="22050">
                                            </div>
                                        </div>
                                    </div>
                                    <div class="row-group">
                                        <div class="col">
                                            <div class="form-group">
                                                <label for="sdr_dc">DC Removal</label>
                                                <select id="sdr_dc" name="enable_dc_removal">
                                                    <option value="true">Ja</option>
                                                    <option value="false">Nej</option>
                                                </select>
                                            </div>
                                        </div>
                                        <div class="col">
                                            <div class="form-group">
                                                <label for="sdr_deemp">De-emphasis</label>
                                                <select id="sdr_deemp" name="enable_deemp">
                                                    <option value="true">Ja</option>
                                                    <option value="false">Nej</option>
                                                </select>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="form-group">
                                        <label for="sdr_inp">Multimon Input Type (-t)</label>
                                        <input type="text" id="sdr_inp" name="multimon_input_type" value="raw">
                                    </div>
                                </div>
                            </details>
                        </div>

                        <div class="modal-actions">
                            <button type="button" class="secondary-btn" onclick="closeSDRModal()">Avbryt</button>
                            <button type="submit" class="primary-btn">Spara Mottagare</button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script>
        const sdrModal = document.getElementById('sdrModal');
        const sdrForm = document.getElementById('sdrForm');
        let currentSDRs = [];

        function switchTab(tabId) {
            document.querySelectorAll('.tab-trigger').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`.tab-trigger[onclick="switchTab('${tabId}')"]`).classList.add('active');
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            document.getElementById(`tab-${tabId}`).classList.add('active');
        }

        function loadGlobalSettings() {
            fetch('/api/settings')
                .then(res => res.json())
                .then(data => {
                    document.getElementById('message_font').value = data.message_font || 'JetBrains Mono';
                    if (data.message_font_size) {
                        document.getElementById('message_font_size').value = data.message_font_size;
                        document.getElementById('message_font_size_slider').value = data.message_font_size;
                        document.getElementById('font_size_val').innerText = data.message_font_size;
                    }
                    updatePreview();
                });
        }

        function loadSDRs() {
            fetch('/api/sdr')
                .then(res => res.json())
                .then(data => {
                    currentSDRs = data;
                    renderSDRList();
                });
        }

        function renderSDRList() {
            const list = document.getElementById('sdrList');
            if (currentSDRs.length === 0) {
                list.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: var(--text-secondary); padding: 2rem;">Inga mottagare tillagda än.</p>';
                return;
            }

            list.innerHTML = currentSDRs.map(sdr => `
                <div class="glass-panel sdr-card ${sdr.enabled ? '' : 'disabled'}">
                    <div class="sdr-card-header">
                        <h3>${sdr.name}</h3>
                        <label class="switch">
                            <input type="checkbox" ${sdr.enabled ? 'checked' : ''} onchange="toggleSDR(${sdr.id}, this.checked)">
                            <span class="slider round"></span>
                        </label>
                    </div>
                    <div class="sdr-card-body">
                        <div class="sdr-info"><span>Frekvens:</span> <strong>${sdr.frequency}</strong></div>
                        <div class="sdr-info"><span>Serial:</span> <strong>${sdr.device_serial || 'Standard'}</strong></div>
                    </div>
                    <div class="sdr-card-actions">
                        <button class="secondary-btn" onclick="openSDRModal(${sdr.id})">Redigera</button>
                        <button class="secondary-btn" onclick="deleteSDR(${sdr.id})" style="color: #ff4444;">Ta bort</button>
                    </div>
                </div>
            `).join('');
        }

        function openSDRModal(id = null) {
            sdrForm.reset();
            document.getElementById('sdr_id').value = id || '';
            document.getElementById('modalTitle').innerText = id ? 'Redigera Mottagare' : 'Lägg till ny mottagare';

            if (id) {
                const sdr = currentSDRs.find(s => s.id === id);
                if (sdr) {
                    document.getElementById('sdr_name').value = sdr.name;
                    document.getElementById('sdr_frequency').value = sdr.frequency;
                    document.getElementById('sdr_device_serial').value = sdr.device_serial;
                    document.getElementById('sdr_gain').value = sdr.gain;
                    document.getElementById('sdr_ppm').value = sdr.ppm_error;
                    document.getElementById('sdr_sr').value = sdr.sample_rate;
                    document.getElementById('sdr_rr').value = sdr.resample_rate;
                    document.getElementById('sdr_dc').value = sdr.enable_dc_removal;
                    document.getElementById('sdr_deemp').value = sdr.enable_deemp;
                    document.getElementById('sdr_inp').value = sdr.multimon_input_type;
                }
            }
            sdrModal.classList.add('show');
        }

        function closeSDRModal() {
            sdrModal.classList.remove('show');
        }

        function toggleSDR(id, enabled) {
            fetch(`/api/sdr/${id}/toggle`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ enabled })
            }).then(() => {
                showStatus('Mottagare ' + (enabled ? 'aktiverad' : 'inaktiverad'), 'success');
                loadSDRs();
            });
        }

        function deleteSDR(id) {
            if (!confirm('Är du säker på att du vill ta bort denna mottagare?')) return;
            fetch(`/api/sdr/${id}`, { method: 'DELETE' })
                .then(() => {
                    showStatus('Mottagare borttagen', 'success');
                    loadSDRs();
                });
        }

        function showStatus(text, type) {
            const statusMsg = document.getElementById('statusMessage');
            statusMsg.innerText = text;
            statusMsg.className = `status-message ${type} show`;
            setTimeout(() => { statusMsg.classList.remove('show'); }, 5000);
        }

        // Global Settings Form
        document.getElementById('globalSettingsForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = document.getElementById('saveGlobalBtn');
            btn.disabled = true;

            const payload = {
                message_font: document.getElementById('message_font').value,
                message_font_size: document.getElementById('message_font_size').value
            };

            const themeVal = document.getElementById('theme').value;
            localStorage.setItem('pagermonitor-theme', themeVal);
            document.documentElement.setAttribute('data-theme', themeVal);

            fetch('/api/settings', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
                .then(res => res.json())
                .then(data => {
                    showStatus('Inställningar sparades!', 'success');
                })
                .finally(() => btn.disabled = false);
        });

        // SDR Form
        sdrForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const formData = new FormData(sdrForm);
            const data = Object.fromEntries(formData.entries());

            // Convert boolean strings to actual booleans
            data.enable_dc_removal = data.enable_dc_removal === 'true';
            data.enable_deemp = data.enable_deemp === 'true';
            data.ppm_error = parseInt(data.ppm_error);

            fetch('/api/sdr', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
                .then(res => res.json())
                .then(data => {
                    showStatus('Mottagare sparad!', 'success');
                    closeSDRModal();
                    loadSDRs();
                })
                .catch(err => showStatus('Kunde inte spara mottagare.', 'error'));
        });

        const fontSelect = document.getElementById('message_font');
        const fontSlider = document.getElementById('message_font_size_slider');
        const fontSizeHidden = document.getElementById('message_font_size');
        const fontSizeValLabel = document.getElementById('font_size_val');
        const previewText = document.getElementById('previewText');

        function updatePreview() {
            const font = fontSelect.value;
            const size = fontSlider.value;
            fontSizeHidden.value = size;
            fontSizeValLabel.innerText = size;
            previewText.style.fontFamily = `'${font}', monospace`;
            previewText.style.fontSize = `${size}rem`;
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadGlobalSettings();
            loadSDRs();

            const currentTheme = localStorage.getItem('pagermonitor-theme') || 'dark';
            document.getElementById('theme').value = currentTheme;
            document.documentElement.setAttribute('data-theme', currentTheme);

            fontSelect.addEventListener('change', updatePreview);
            fontSlider.addEventListener('input', updatePreview);
        });
    </script>
</body>

</html>
