<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PagerMonitor Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-effects">
        <div class="glow glow-1"></div>
        <div class="glow glow-2"></div>
    </div>

    <div class="container">
        <header>
            <h1><span class="highlight">Pager</span>Monitor</h1>
            <p>Realtidsövervakning av POCSAG-larm (169.800 MHz)</p>
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Sök larm eller adresser...">
                <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            </div>
        </header>

        <main>
            <div class="glass-panel table-container">
                <table id="alarmsTable">
                    <thead>
                        <tr>
                            <th>Tidstämpel</th>
                            <th>Adress</th>
                            <th>Meddelande</th>
                        </tr>
                    </thead>
                    <tbody id="alarmsBody">
                        <!-- Alarms will be injected here via JavaScript -->
                    </tbody>
                </table>
                <div id="loading" class="loading-state">Laddar historik...</div>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const alarmsBody = document.getElementById('alarmsBody');
            const searchInput = document.getElementById('searchInput');
            const loading = document.getElementById('loading');
            let allAlarms = [];

            // Fetch and render alarms
            const fetchAlarms = async () => {
                try {
                    const response = await fetch('/api/messages');
                    if (!response.ok) throw new Error('Network response was not ok');
                    const data = await response.json();
                    
                    if (data.length > 0) {
                        loading.style.display = 'none';
                    } else if (allAlarms.length === 0) {
                        loading.innerText = 'Inga larm hittades.';
                    }

                    // Check if new data arrived to trigger animation (simple length check for POC)
                    const isNewData = data.length > allAlarms.length;
                    allAlarms = data;
                    renderAlarms();
                } catch (error) {
                    console.error('Error fetching alarms:', error);
                }
            };

            const renderAlarms = () => {
                const query = searchInput.value.toLowerCase();
                alarmsBody.innerHTML = '';
                
                const filtered = allAlarms.filter(alarm => 
                    alarm.address.toLowerCase().includes(query) || 
                    alarm.message.toLowerCase().includes(query) ||
                    new Date(alarm.timestamp).toLocaleString('sv-SE').includes(query)
                );

                filtered.forEach((alarm, index) => {
                    const tr = document.createElement('tr');
                    tr.className = 'fade-in';
                    tr.style.animationDelay = `${index * 0.05}s`;
                    
                    const time = new Date(alarm.timestamp).toLocaleString('sv-SE', {
                        year: 'numeric', month: '2-digit', day: '2-digit', 
                        hour: '2-digit', minute:'2-digit', second:'2-digit'
                    });

                    tr.innerHTML = `
                        <td class="ts-cell">${time}</td>
                        <td class="addr-cell"><span class="badge">${alarm.address}</span></td>
                        <td class="msg-cell">${alarm.message}</td>
                    `;
                    alarmsBody.appendChild(tr);
                });
            };

            searchInput.addEventListener('input', renderAlarms);

            // Initial fetch
            fetchAlarms();
            // Poll every 3 seconds
            setInterval(fetchAlarms, 3000);
        });
    </script>
</body>
</html>
