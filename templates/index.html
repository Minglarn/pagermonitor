<!DOCTYPE html>
<html lang="sv">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PagerMonitor Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>

<body>
    <div class="background-effects">
        <div class="glow glow-1"></div>
        <div class="glow glow-2"></div>
    </div>

    <div class="container">
        <nav class="top-nav">
            <a href="/" class="nav-link active">Dashboard</a>
            <a href="/aliases" class="nav-link">Alias</a>
            <a href="/settings" class="nav-link">Inställningar</a>
        </nav>

        <header>
            <h1><span class="highlight">Pager</span>Monitor</h1>
            <p>Realtidsövervakning av POCSAG-larm</p>
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Sök larm eller adresser...">
                <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <div id="rx-indicator" class="rx-status-dot" title="Tar emot data"></div>
                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
            </div>
        </header>

        <main>
            <div class="glass-panel table-container">
                <table id="alarmsTable">
                    <thead>
                        <tr>
                            <th>Tidstämpel</th>
                            <th>CapCode (Alias)</th>
                            <th>Meddelande</th>
                        </tr>
                    </thead>
                    <tbody id="alarmsBody">
                        <!-- Alarms will be injected here via JavaScript -->
                    </tbody>
                </table>
                <div id="loading" class="loading-state">Laddar historik...</div>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const alarmsBody = document.getElementById('alarmsBody');
            const searchInput = document.getElementById('searchInput');
            const loading = document.getElementById('loading');
            let allAlarms = [];

            // Formatter helper
            function formatMessage(msgStr) {
                // Ensure newlines are converted to HTML breaks for proper display
                // (Though sdr_processor.py cleans <CR><LF> into \n now, we also handle raw text just in case)
                let formatted = msgStr.replace(/<CR><LF>/g, '<br>').replace(/\n/g, '<br>');
                return formatted;
            }

            // Fetch and render historical alarms initially
            const fetchAlarms = async () => {
                try {
                    const response = await fetch('/api/messages');
                    if (!response.ok) throw new Error('Network response was not ok');
                    const data = await response.json();

                    if (data.length > 0) {
                        loading.style.display = 'none';
                    } else {
                        loading.innerText = 'Inga larm hittades.';
                    }

                    allAlarms = data;
                    renderAlarms();
                } catch (error) {
                    console.error('Error fetching alarms:', error);
                }
            };

            const renderAlarms = () => {
                const query = searchInput.value.toLowerCase();
                alarmsBody.innerHTML = '';

                const filtered = allAlarms.filter(alarm =>
                    alarm.address.toLowerCase().includes(query) ||
                    alarm.message.toLowerCase().includes(query) ||
                    (alarm.alias && alarm.alias.toLowerCase().includes(query)) ||
                    new Date(alarm.timestamp).toLocaleString('sv-SE').includes(query)
                );

                filtered.forEach((alarm, index) => {
                    const tr = document.createElement('tr');
                    tr.className = 'fade-in';
                    tr.style.animationDelay = `${index * 0.05}s`;

                    const time = new Date(alarm.timestamp).toLocaleString('sv-SE', {
                        year: 'numeric', month: '2-digit', day: '2-digit',
                        hour: '2-digit', minute: '2-digit', second: '2-digit'
                    });

                    const displayAddress = alarm.alias ? alarm.alias : alarm.address;

                    tr.innerHTML = `
                        <td class="ts-cell">${time}</td>
                        <td class="addr-cell"><span class="badge" title="${alarm.address}">${displayAddress}</span></td>
                        <td class="msg-cell">${formatMessage(alarm.message)}</td>
                    `;
                    alarmsBody.appendChild(tr);
                });
            };

            searchInput.addEventListener('input', renderAlarms);

            // Fetch historical logic
            fetchAlarms();

            // Setup Server-Sent Events (SSE) for Real-Time UI updates without polling
            const evtSource = new EventSource("/stream");

            // RX Indicator flash function
            const rxIndicator = document.getElementById('rx-indicator');
            function flashRx() {
                rxIndicator.classList.add('active');
                setTimeout(() => {
                    rxIndicator.classList.remove('active');
                }, 500); // flash duration
            }

            evtSource.onmessage = function (event) {
                const data = JSON.parse(event.data);

                // Flash the indicator for any activity (message or ping)
                flashRx();

                if (data.type === 'ping') {
                    // It's just a keep-alive or a blocked message, do nothing else.
                    return;
                }

                // If it's a real message, process it
                if (!allAlarms.some(a => a.id === data.id)) {
                    allAlarms.unshift(data);
                    // Keep only top 100 max in memory (matches backend get limit)
                    if (allAlarms.length > 100) allAlarms.pop();

                    loading.style.display = 'none';
                    renderAlarms();
                }
            };

            evtSource.onerror = function (err) {
                console.error("EventSource failed. Reconnecting...", err);
            };
        });
    </script>
</body>

</html>
