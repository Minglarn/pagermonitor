<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PagerMonitor Dashboard</title>
    <link rel="stylesheet" href="/static/style.css?v=2">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&family=Fira+Code:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500;600&family=Inconsolata:wght@400;700&family=JetBrains+Mono:wght@400;500;800&family=Roboto+Mono:wght@400;500;700&family=Source+Code+Pro:wght@400;600;800&family=Space+Mono:wght@400;700&family=Ubuntu+Mono:wght@400;700&family=Courier+Prime:wght@400;700&family=Share+Tech+Mono&family=Anonymous+Pro:wght@400;700&family=VT323&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        // Apply theme and font settings immediately to prevent flickering
        (function () {
            const theme = localStorage.getItem('pagermonitor-theme') || 'dark';
            document.documentElement.setAttribute('data-theme', theme);

            const isCollapsed = localStorage.getItem('sidebar-collapsed') === 'true';
            if (isCollapsed) {
                document.addEventListener('DOMContentLoaded', () => {
                    document.getElementById('sidebar').classList.add('collapsed');
                });
            }
        })();

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('collapsed');
            localStorage.setItem('sidebar-collapsed', sidebar.classList.contains('collapsed'));
        }
    </script>
</head>

<body class="dashboard-page">
    <div class="app-layout">
        <nav class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-satellite-dish" style="font-size: 1.5rem; color: var(--accent);"></i>
                <div class="sidebar-logo">
                    <h1>Pager<span>Monitor</span></h1>
                    <p>POCSAG Monitor</p>
                </div>
            </div>

            <div class="sidebar-nav">
                <a href="/" class="nav-item active">
                    <i class="fas fa-th-large"></i>
                    <span>Dashboard</span>
                </a>
                <a href="/aliases" class="nav-item">
                    <i class="fas fa-tag"></i>
                    <span>Alias</span>
                </a>
                <a href="/alerts" class="nav-item">
                    <i class="fas fa-bell"></i>
                    <span>Alerts</span>
                </a>
                <a href="/statistics" class="nav-item">
                    <i class="fas fa-chart-bar"></i>
                    <span>Statistics</span>
                </a>
                <a href="/settings" class="nav-item">
                    <i class="fas fa-cog"></i>
                    <span>Settings</span>
                </a>
            </div>

            <div class="sidebar-footer">
                <button class="sidebar-toggle" onclick="toggleSidebar()" title="Toggle Menu">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
        </nav>

        <div class="main-content">
            <header>
                <div class="header-content">
                    <div class="header-main">
                        <h1>Real-time Monitor</h1>
                        <p>Live POCSAG messages and pager traffic</p>
                    </div>
                    <div class="search-container">
                        <input type="text" id="searchInput" placeholder="Search CapCodes, Aliases or messages...">
                        <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg>
                        <div id="rx-indicator" class="rx-status-dot" title="Receiving data"></div>
                    </div>
                </div>
            </header>

            <main>
                <div class="glass-panel table-container">
                    <table id="alarmsTable">
                        <thead>
                            <tr>
                                <th>Timestamp</th>
                                <th>Frequency</th>
                                <th>CapCode (Alias)</th>
                                <th>Message</th>
                            </tr>
                        </thead>
                        <tbody id="alarmsBody">
                            <!-- Alarms will be injected here via JavaScript -->
                        </tbody>
                    </table>
                    <div id="loading" class="loading-state">Loading history...</div>
                </div>
            </main>
        </div>
    </div>

    <!-- Quick Alias Modal -->
    <div id="aliasModal" class="modal-overlay">
        <div class="modal-content">
            <button class="close-btn" onclick="closeAliasModal()">&times;</button>
            <div class="modal-header">
                <h2>Create/Edit Alias</h2>
                <p>Link a readable name to this CapCode.</p>
            </div>
            <form id="aliasModalForm">
                <div class="form-group">
                    <label for="modal_address">CapCode Address</label>
                    <input type="text" id="modal_address" name="address" readonly style="opacity: 0.7;">
                </div>
                <div class="form-group">
                    <label for="modal_alias">Alias (Label)</label>
                    <input type="text" id="modal_alias" name="alias" placeholder="e.g. Fire Department" required>
                </div>
                <div class="form-group checkbox-group">
                    <label>
                        <input type="checkbox" id="modal_is_hidden" name="is_hidden">
                        Mute messages from this address (Hide)
                    </label>
                </div>
                <div class="form-actions">
                    <button type="submit" id="modalSaveBtn" class="primary-btn">Save Alias</button>
                </div>
            </form>
            <div id="modalStatus" class="status-message"></div>
        </div>
    </div>

    <script>
        // Global Modal Functions
        function openAliasModal(address) {
            document.getElementById('modal_address').value = address;
            document.getElementById('modal_alias').value = '';
            document.getElementById('modal_is_hidden').checked = false;

            // Try to pre-fill if alias exists in memory
            if (window.currentAlarmsData) {
                const existing = window.currentAlarmsData.find(a => a.address === address);
                if (existing && existing.alias) {
                    document.getElementById('modal_alias').value = existing.alias;
                    // We can't know is_hidden simply from history, but users can re-mute
                }
            }

            document.getElementById('aliasModal').classList.add('show');
            document.getElementById('modal_alias').focus();
        }

        function closeAliasModal() {
            document.getElementById('aliasModal').classList.remove('show');
        }

        document.addEventListener('DOMContentLoaded', () => {
            const alarmsBody = document.getElementById('alarmsBody');
            const searchInput = document.getElementById('searchInput');
            const loading = document.getElementById('loading');
            let allAlarms = [];
            let alertWords = [];

            // Fetch Alert Words
            const fetchAlertWords = async () => {
                const res = await fetch('/api/alerts');
                alertWords = await res.json();
            };

            // Highlight word matches
            function highlightMessage(text) {
                if (!alertWords.length) return text;
                let highlighted = text;
                alertWords.forEach(aw => {
                    if (aw.is_active) {
                        // Regex: Match the word ONLY if it is NOT part of an HTML tag
                        // Uses a negative lookahead to ignore everything before a closing `>` 
                        // if there wasn't an opening `<` first.
                        const regex = new RegExp(`(${aw.word})(?![^<]*>)`, 'gi');
                        highlighted = highlighted.replace(regex, `<span class="alert-word" style="color: ${aw.color || '#ef4444'}; border-bottom-color: ${aw.color || '#ef4444'}">$1</span>`);
                    }
                });
                return highlighted;
            }

            // Formatter helper
            function formatMessage(msgStr) {
                let formatted = msgStr.replace(/<CR><LF>/g, '<br>').replace(/\n/g, '<br>');
                return highlightMessage(formatted);
            }

            // Fetch and render historical alarms initially
            const fetchAlarms = async () => {
                try {
                    const response = await fetch('/api/messages');
                    if (!response.ok) throw new Error('Network response was not ok');
                    const data = await response.json();

                    if (data.length > 0) {
                        loading.style.display = 'none';
                    } else {
                        loading.innerText = 'No messages found.';
                    }

                    allAlarms = data;
                    window.currentAlarmsData = allAlarms; // expose for modal
                    renderAlarms();
                } catch (error) {
                    console.error('Error fetching alarms:', error);
                }
            };

            // Fetch and apply settings (for fonts)
            const fetchSettings = async () => {
                const res = await fetch('/api/settings');
                const settings = await res.json();
                if (settings.message_font) {
                    document.documentElement.style.setProperty('--msg-font', `'${settings.message_font}', monospace`);
                }
                if (settings.message_font_size) {
                    document.documentElement.style.setProperty('--msg-size', `${settings.message_font_size}rem`);
                }
            };

            const renderAlarms = (maintainScroll = false) => {
                const query = searchInput.value.toLowerCase();
                const container = document.querySelector('.table-container');

                // Save scroll position state
                const previousScrollTop = container.scrollTop;
                const previousScrollHeight = container.scrollHeight;
                const wasAtTop = previousScrollTop < 20; // 20px threshold for "at the top"

                alarmsBody.innerHTML = '';

                const filtered = allAlarms.filter(alarm =>
                    alarm.address.toLowerCase().includes(query) ||
                    alarm.message.toLowerCase().includes(query) ||
                    (alarm.alias && alarm.alias.toLowerCase().includes(query)) ||
                    new Date(alarm.timestamp).toLocaleString('sv-SE').includes(query)
                );

                let lastGroupKey = null;

                filtered.forEach((alarm, index) => {
                    const dateObj = new Date(alarm.timestamp);
                    const time = dateObj.toLocaleString('sv-SE', {
                        year: 'numeric', month: '2-digit', day: '2-digit',
                        hour: '2-digit', minute: '2-digit', second: '2-digit'
                    });

                    // Group by Date and Hour (e.g., "2023-10-27 14:xx")
                    const groupKey = dateObj.toLocaleString('sv-SE', {
                        year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit'
                    });

                    // Insert divider if the group changes
                    if (groupKey !== lastGroupKey) {
                        const dividerTr = document.createElement('tr');
                        dividerTr.className = 'time-divider';
                        // Format specifically for the divider (e.g. "Today 14:00" or just the date+hour)
                        const isToday = new Date().toDateString() === dateObj.toDateString();
                        const headerPrefix = isToday ? "Today" : dateObj.toLocaleDateString('sv-SE');
                        const headerHour = dateObj.toLocaleTimeString('sv-SE', { hour: '2-digit', minute: '2-digit' }).split(':')[0] + ":00";

                        dividerTr.innerHTML = `<td colspan="4"><div class="divider-content">${headerPrefix} at ${headerHour}</div></td>`;
                        alarmsBody.appendChild(dividerTr);
                        lastGroupKey = groupKey;
                    }

                    const tr = document.createElement('tr');
                    tr.className = 'fade-in';
                    tr.style.animationDelay = `${index * 0.05}s`;

                    // Check for general alert row highlighting
                    const hasAlert = alertWords.some(aw => aw.is_active && alarm.message.toUpperCase().includes(aw.word.toUpperCase()));
                    if (hasAlert) {
                        tr.classList.add('alert-row', 'alert-pulse-bg');
                    }

                    const dateStr = new Date(alarm.timestamp).toLocaleDateString('sv-SE', {
                        year: 'numeric', month: '2-digit', day: '2-digit'
                    });
                    const timeStr = new Date(alarm.timestamp).toLocaleTimeString('sv-SE', {
                        hour: '2-digit', minute: '2-digit', second: '2-digit'
                    });
                    const formattedTime = `${dateStr}<br>${timeStr}`;

                    const displayAddress = alarm.alias ? alarm.alias : alarm.address;
                    const bitrateTag = alarm.bitrate ? `<span class="badge meta">${alarm.bitrate}bps</span>` : '';
                    const funcLabel = alarm.function !== undefined ? (alarm.function === 0 || alarm.function === 3 ? "Alpha" : "Num") : "";
                    const funcTag = funcLabel ? `<span class="badge meta">${funcLabel}</span>` : '';
                    const freqTag = alarm.frequency ? `<span class="badge meta" style="background: rgba(168, 85, 247, 0.1); color: #a855f7;">${alarm.frequency}</span>` : '';

                    const duplicateTag = alarm.is_duplicate ? `<span class="badge warning meta" style="margin-left: 5px;">Duplicate</span>` : '';

                    tr.innerHTML = `
                        <td class="ts-cell">${formattedTime}</td>
                        <td class="addr-cell">${freqTag}${bitrateTag}${funcTag}${duplicateTag}</td>
                        <td class="addr-cell">
                            <span class="badge" title="${alarm.address}" onclick="openAliasModal('${alarm.address}')">${displayAddress}</span>
                        </td>
                        <td class="msg-cell">${formatMessage(alarm.message)}</td>
                    `;
                    alarmsBody.appendChild(tr);
                });

                // Restore scroll if needed
                if (maintainScroll) {
                    if (wasAtTop) {
                        container.scrollTop = 0; // Stick to top for new messages
                    } else {
                        // Maintain relative position if content pushed down by new messages at the top
                        const newScrollHeight = container.scrollHeight;
                        const heightDifference = newScrollHeight - previousScrollHeight;
                        if (heightDifference > 0) {
                            container.scrollTop = previousScrollTop + heightDifference;
                        } else {
                            container.scrollTop = previousScrollTop;
                        }
                    }
                }
            };

            searchInput.addEventListener('input', renderAlarms);

            // Fetch historical logic
            // Initial data fetch
            fetchSettings();
            fetchAlertWords().then(fetchAlarms);

            // Setup Server-Sent Events (SSE) for Real-Time UI updates without polling
            const evtSource = new EventSource("/stream");

            // RX Indicator flash function
            const rxIndicator = document.getElementById('rx-indicator');
            function flashRx() {
                rxIndicator.classList.add('active');
                setTimeout(() => {
                    rxIndicator.classList.remove('active');
                }, 500); // flash duration
            }

            evtSource.onmessage = function (event) {
                const data = JSON.parse(event.data);

                // Flash the indicator for any activity (message or ping)
                flashRx();

                if (data.type === 'ping') {
                    // It's just a keep-alive or a blocked message, do nothing else.
                    return;
                }

                // If it's a real message, process it
                if (!allAlarms.some(a => a.id === data.id)) {
                    allAlarms.unshift(data);
                    // Keep only top 100 max in memory (matches backend get limit)
                    if (allAlarms.length > 200) allAlarms.pop();

                    loading.style.display = 'none';
                    renderAlarms(true); // true = maintain scroll logic
                }
            };

            evtSource.onerror = function (err) {
                console.error("EventSource failed. Reconnecting...", err);
            };
            // Modal Form Submission Handling
            const aliasModalForm = document.getElementById('aliasModalForm');
            const modalStatus = document.getElementById('modalStatus');
            const modalSaveBtn = document.getElementById('modalSaveBtn');

            aliasModalForm.addEventListener('submit', (e) => {
                e.preventDefault();
                modalSaveBtn.innerText = 'Saving...';
                modalSaveBtn.disabled = true;

                const payload = {
                    address: document.getElementById('modal_address').value,
                    alias: document.getElementById('modal_alias').value,
                    is_hidden: document.getElementById('modal_is_hidden').checked
                };

                fetch('/api/aliases', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                })
                    .then(res => res.json())
                    .then(data => {
                        if (data.status === 'success') {
                            // Apply alias immediately to local data matching address
                            allAlarms.forEach(alarm => {
                                if (alarm.address === payload.address) alarm.alias = payload.alias;
                            });

                            // If hidden, remove from array
                            if (payload.is_hidden) {
                                allAlarms = allAlarms.filter(a => a.address !== payload.address);
                            }
                            renderAlarms(); // Re-render table

                            closeAliasModal();
                        } else {
                            modalStatus.innerText = 'Something went wrong: ' + data.message;
                            modalStatus.className = 'status-message error show';
                        }
                    })
                    .catch(err => {
                        console.error(err);
                        modalStatus.innerText = 'Network error while saving.';
                        modalStatus.className = 'status-message error show';
                    })
                    .finally(() => {
                        modalSaveBtn.innerText = 'Save Alias';
                        modalSaveBtn.disabled = false;
                        setTimeout(() => modalStatus.classList.remove('show'), 5000);
                    });
            });

        });
    </script>
</body>

</html>
