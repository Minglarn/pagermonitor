<!DOCTYPE html>
<html lang="sv">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PagerMonitor - Alert Words</title>
    <link rel="stylesheet" href="/static/style.css?v=2">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;600&family=Share+Tech+Mono&family=Anonymous+Pro:wght@400;700&family=VT323&family=Roboto+Mono:wght@400;600&family=Source+Code+Pro:wght@400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        // Apply theme immediately to prevent flickering
        (function () {
            const theme = localStorage.getItem('pagermonitor-theme') || 'dark';
            document.documentElement.setAttribute('data-theme', theme);

            const isCollapsed = localStorage.getItem('sidebar-collapsed') === 'true';
            if (isCollapsed) {
                document.addEventListener('DOMContentLoaded', () => {
                    document.getElementById('sidebar').classList.add('collapsed');
                });
            }
        })();

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('collapsed');
            localStorage.setItem('sidebar-collapsed', sidebar.classList.contains('collapsed'));
        }
    </script>
</head>

<body>
    <div class="app-layout">
        <nav class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-satellite-dish" style="font-size: 1.5rem; color: var(--accent);"></i>
                <div class="sidebar-logo">
                    <h1>Pager<span>Monitor</span></h1>
                    <p>POCSAG Monitor</p>
                </div>
            </div>

            <div class="sidebar-nav">
                <a href="/" class="nav-item">
                    <i class="fas fa-th-large"></i>
                    <span>Dashboard</span>
                </a>
                <a href="/aliases" class="nav-item">
                    <i class="fas fa-tag"></i>
                    <span>Alias</span>
                </a>
                <a href="/alerts" class="nav-item active">
                    <i class="fas fa-bell"></i>
                    <span>Alerts</span>
                </a>
                <a href="/statistics" class="nav-item">
                    <i class="fas fa-chart-bar"></i>
                    <span>Statistik</span>
                </a>
                <a href="/settings" class="nav-item">
                    <i class="fas fa-cog"></i>
                    <span>Inställningar</span>
                </a>
            </div>

            <div class="sidebar-footer">
                <button class="sidebar-toggle" onclick="toggleSidebar()" title="Toggle meny">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
        </nav>

        <div class="main-content">
            <header>
                <h1><span class="highlight">Alert</span> Watchlist</h1>
                <p>Hantera ord som ska lysa upp extra mycket i listan.</p>
            </header>

            <main>
                <div class="glass-panel form-container">
                    <form id="alertForm">
                        <div class="form-group">
                            <label for="word">Nytt bevakningsord</label>
                            <input type="text" id="word" name="word" placeholder="T.ex. BRAND eller OLYCKA" required>
                            <small>Versaler eller gemener spelar ingen roll.</small>
                        </div>

                        <div class="form-actions">
                            <button type="submit" id="saveBtn" class="primary-btn">Lägg till i bevakning</button>
                        </div>
                    </form>
                    <div id="status" class="status-message"></div>

                    <hr class="separator">

                    <h3>Aktiva bevakningsord</h3>
                    <div class="table-container" style="min-height: auto;">
                        <table id="alertsTable">
                            <thead>
                                <tr>
                                    <th>Ord</th>
                                    <th>Status</th>
                                    <th>Åtgärd</th>
                                </tr>
                            </thead>
                            <tbody id="alertsBody"></tbody>
                        </table>
                    </div>
                </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const alertsBody = document.getElementById('alertsBody');
            const alertForm = document.getElementById('alertForm');
            const status = document.getElementById('status');
            const saveBtn = document.getElementById('saveBtn');

            const fetchAlerts = async () => {
                const res = await fetch('/api/alerts');
                const data = await res.json();
                renderAlerts(data);
            };

            const renderAlerts = (alerts) => {
                alertsBody.innerHTML = '';
                alerts.forEach(a => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td><span class="alert-word" style="color: ${a.color || '#ef4444'}; border-bottom-color: ${a.color || '#ef4444'}">${a.word}</span></td>
                        <td><span class="badge ${a.is_active ? 'success' : ''}">${a.is_active ? 'Aktiv' : 'Inaktiv'}</span></td>
                        <td>
                            <button class="action-btn delete-btn" onclick="deleteAlert(${a.id})">Ta bort</button>
                        </td>
                    `;
                    alertsBody.appendChild(tr);
                });
            };

            alertForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                saveBtn.innerText = 'Sparar...';
                saveBtn.disabled = true;

                const inputVal = document.getElementById('word').value.toUpperCase();
                // Split by comma and clean up whitespace, ignoring empty strings
                const words = inputVal.split(',').map(w => w.trim()).filter(w => w.length > 0);

                if (words.length === 0) {
                    status.innerText = 'Ange minst ett ord.';
                    status.className = 'status-message error show';
                    saveBtn.innerText = 'Lägg till i bevakning';
                    saveBtn.disabled = false;
                    setTimeout(() => status.classList.remove('show'), 3000);
                    return;
                }

                try {
                    // Create an array of Promises for each word to save
                    const savePromises = words.map(word => {
                        const payload = {
                            word: word,
                            color: '#ef4444', // Default to red pulse
                            is_active: true
                        };
                        return fetch('/api/alerts', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });
                    });

                    // Wait for all to complete
                    const results = await Promise.all(savePromises);

                    const allOk = results.every(res => res.ok);

                    if (allOk) {
                        status.innerText = words.length > 1 ? `${words.length} ord tillagda!` : 'Ord tillagt!';
                        status.className = 'status-message success show';
                        document.getElementById('word').value = '';
                        fetchAlerts();
                    } else {
                        throw new Error("Ett eller flera ord kunde inte sparas.");
                    }
                } catch (e) {
                    status.innerText = 'Något gick fel: ' + e.message;
                    status.className = 'status-message error show';
                } finally {
                    saveBtn.innerText = 'Lägg till i bevakning';
                    saveBtn.disabled = false;
                    setTimeout(() => status.classList.remove('show'), 3000);
                }
            });

            window.deleteAlert = async (id) => {
                if (!confirm('Ta bort detta ord från bevakningen?')) return;
                await fetch('/api/alerts', {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id })
                });
                fetchAlerts();
            };

            fetchAlerts();
        });
    </script>
</body>

</html>
