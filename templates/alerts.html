<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PagerMonitor - Alert Words</title>
    <link rel="stylesheet" href="/static/style.css?v=2">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;600&family=Share+Tech+Mono&family=Anonymous+Pro:wght@400;700&family=VT323&family=Roboto+Mono:wght@400;600&family=Source+Code+Pro:wght@400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        // Apply theme immediately to prevent flickering
        (function () {
            const theme = localStorage.getItem('pagermonitor-theme') || 'dark';
            document.documentElement.setAttribute('data-theme', theme);

            const isCollapsed = localStorage.getItem('sidebar-collapsed') === 'true';
            if (isCollapsed) {
                document.addEventListener('DOMContentLoaded', () => {
                    document.getElementById('sidebar').classList.add('collapsed');
                });
            }
        })();

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('collapsed');
            localStorage.setItem('sidebar-collapsed', sidebar.classList.contains('collapsed'));
        }
    </script>
</head>

<body>
    <div class="app-layout">
        <nav class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <i id="satellite-icon" class="fas fa-satellite-dish" style="font-size: 1.5rem; color: var(--accent); transition: all 0.2s ease;"></i>
                <div class="sidebar-logo">
                    <h1>Pager<span>Monitor</span></h1>
                    <p>POCSAG Monitor</p>
                    <span id="conn-status-msg" class="conn-status-text" style="display: none;"></span>
                </div>
            </div>

            <div class="sidebar-nav">
                <a href="/" class="nav-item">
                    <i class="fas fa-th-large"></i>
                    <span>Dashboard</span>
                </a>
                <a href="/aliases" class="nav-item">
                    <i class="fas fa-tag"></i>
                    <span>Alias</span>
                </a>
                <a href="/alerts" class="nav-item active">
                    <i class="fas fa-bell"></i>
                    <span>Alerts</span>
                </a>
                <a href="/statistics" class="nav-item">
                    <i class="fas fa-chart-bar"></i>
                    <span>Statistics</span>
                </a>
                <a href="/settings" class="nav-item">
                    <i class="fas fa-cog"></i>
                    <span>Settings</span>
                </a>
            </div>

            <div class="sidebar-footer">
                <button class="sidebar-toggle" onclick="toggleSidebar()" title="Toggle Menu">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
        </nav>

        <div class="main-content">
            <header>
                <h1><span class="highlight">Alert</span> Watchlist</h1>
                <p>Manage words that will be highlighted in the feed.</p>
            </header>

            <main>
                <div class="glass-panel form-container" style="padding: 1.5rem;">
                    <div class="form-group" style="margin-bottom: 0.5rem;">
                        <label for="wordsArea" style="font-size: 0.85rem; margin-bottom: 0.5rem; display: block;">
                            Edit your watchwords below. Separate words with commas. Case insensitive.
                        </label>
                        <textarea id="wordsArea" rows="4" placeholder="e.g. BRAND, OLYCKA, POLIS, AMBULANS"
                            style="width: 100%; padding: 0.75rem; font-family: 'JetBrains Mono', monospace; font-size: 1rem; background: var(--input-bg, rgba(0,0,0,0.2)); color: var(--text-primary); border: 1px solid var(--panel-border); border-radius: 10px; resize: vertical;"></textarea>
                    </div>
                    <div style="display: flex; align-items: center; gap: 1rem; margin-top: 0.75rem;">
                        <button id="saveBtn" class="primary-btn" style="padding: 0.5rem 1.5rem;"
                            onclick="saveWords()">Save Watchlist</button>
                        <span id="status" class="status-message"></span>
                    </div>
                </div>
        </div>
    </div>

    <script>
        let currentAlerts = [];
        const satIcon = document.getElementById('satellite-icon');
        const statusMsgConn = document.getElementById('conn-status-msg');

        // SSE for Connection Status Only
        const evtSource = new EventSource("/stream");
        
        evtSource.onopen = function() {
            satIcon.classList.remove('conn-error');
            satIcon.classList.add('conn-ok');
            if (statusMsgConn) statusMsgConn.style.display = 'none';
        };

        evtSource.onerror = function() {
            satIcon.classList.remove('conn-ok');
            satIcon.classList.add('conn-error');
            if (statusMsgConn) {
                statusMsgConn.innerText = "Connection Lost";
                statusMsgConn.style.display = 'block';
            }
        };

        evtSource.onmessage = function() {
            // Flash for any activity
            satIcon.classList.remove('extreme-pulse');
            void satIcon.offsetWidth;
            satIcon.classList.add('extreme-pulse');
        };

        async function loadWords() {
            const res = await fetch('/api/alerts');
            currentAlerts = await res.json();
            const words = currentAlerts.map(a => a.word).join(', ');
            document.getElementById('wordsArea').value = words;
        }

        async function saveWords() {
            const btn = document.getElementById('saveBtn');
            const statusEl = document.getElementById('status');
            btn.disabled = true;
            btn.innerText = 'Saving...';

            const rawText = document.getElementById('wordsArea').value;
            const newWords = rawText.split(',').map(w => w.trim().toUpperCase()).filter(w => w.length > 0);
            // Deduplicate
            const uniqueNewWords = [...new Set(newWords)];

            const oldWords = currentAlerts.map(a => a.word.toUpperCase());

            // Find words to add (in new but not in old)
            const toAdd = uniqueNewWords.filter(w => !oldWords.includes(w));
            // Find words to remove (in old but not in new)
            const toRemove = currentAlerts.filter(a => !uniqueNewWords.includes(a.word.toUpperCase()));

            try {
                // Add new words
                for (const word of toAdd) {
                    await fetch('/api/alerts', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ word, color: '#ef4444', is_active: true })
                    });
                }

                // Remove deleted words
                for (const alert of toRemove) {
                    await fetch('/api/alerts', {
                        method: 'DELETE',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ id: alert.id })
                    });
                }

                statusEl.innerText = 'Watchlist saved!';
                statusEl.className = 'status-message success show';
                await loadWords(); // Reload to sync state
            } catch (e) {
                statusEl.innerText = 'Error: ' + e.message;
                statusEl.className = 'status-message error show';
            } finally {
                btn.disabled = false;
                btn.innerText = 'Save Watchlist';
                setTimeout(() => statusEl.classList.remove('show'), 3000);
            }
        }

        document.addEventListener('DOMContentLoaded', loadWords);
    </script>
</body>

</html>
