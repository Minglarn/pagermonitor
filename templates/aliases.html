<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PagerMonitor Alias</title>
    <link rel="stylesheet" href="/static/style.css?v=2">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&family=JetBrains+Mono:wght@400;600&family=Share+Tech+Mono&family=Anonymous+Pro:wght@400;700&family=VT323&family=Roboto+Mono:wght@400;600&family=Source+Code+Pro:wght@400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        // Apply theme immediately to prevent flickering
        (function () {
            const theme = localStorage.getItem('pagermonitor-theme') || 'dark';
            document.documentElement.setAttribute('data-theme', theme);

            const isCollapsed = localStorage.getItem('sidebar-collapsed') === 'true';
            if (isCollapsed) {
                document.addEventListener('DOMContentLoaded', () => {
                    document.getElementById('sidebar').classList.add('collapsed');
                });
            }
        })();

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('collapsed');
            localStorage.setItem('sidebar-collapsed', sidebar.classList.contains('collapsed'));
        }
    </script>
</head>

<body>
    <div class="app-layout">
        <nav class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-satellite-dish" style="font-size: 1.5rem; color: var(--accent);"></i>
                <div class="sidebar-logo">
                    <h1>Pager<span>Monitor</span></h1>
                    <p>POCSAG Monitor</p>
                </div>
            </div>

            <div class="sidebar-nav">
                <a href="/" class="nav-item">
                    <i class="fas fa-th-large"></i>
                    <span>Dashboard</span>
                </a>
                <a href="/aliases" class="nav-item active">
                    <i class="fas fa-tag"></i>
                    <span>Alias</span>
                </a>
                <a href="/alerts" class="nav-item">
                    <i class="fas fa-bell"></i>
                    <span>Alerts</span>
                </a>
                <a href="/statistics" class="nav-item">
                    <i class="fas fa-chart-bar"></i>
                    <span>Statistics</span>
                </a>
                <a href="/settings" class="nav-item">
                    <i class="fas fa-cog"></i>
                    <span>Settings</span>
                </a>
            </div>

            <div class="sidebar-footer">
                <button class="sidebar-toggle" onclick="toggleSidebar()" title="Toggle Menu">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
        </nav>

        <div class="main-content">
            <header>
                <h1><span class="highlight">CapCode Alias</span></h1>
                <p>Link addresses to names and ignore spam</p>
            </header>

            <main>
                <div class="glass-panel form-container">
                    <form id="aliasForm">
                        <div class="form-group row-group">
                            <div class="col">
                                <label for="address">CapCode / Address</label>
                                <input type="text" id="address" name="address" placeholder="e.g. 1234567" required>
                            </div>
                            <div class="col">
                                <label for="alias">Alias Name</label>
                                <input type="text" id="alias" name="alias" placeholder="e.g. Fire Department" required>
                            </div>
                        </div>

                        <div class="form-group checkbox-group">
                            <label>
                                <input type="checkbox" id="is_hidden" name="is_hidden">
                                Mute / Hide alerts from this address
                            </label>
                        </div>

                        <div class="form-actions">
                            <button type="submit" id="saveAliasBtn" class="primary-btn">Save Alias</button>
                        </div>
                    </form>

                    <div id="statusMessage" class="status-message"></div>

                    <hr class="separator">

                    <h3>Existing Aliases</h3>
                    <div class="table-container">
                        <table class="glass-table">
                            <thead>
                                <tr>
                                    <th>CapCode</th>
                                    <th>Alias</th>
                                    <th>Status</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody id="aliasTableBody">
                                <tr>
                                    <td colspan="4" style="text-align:center;">Loading...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('aliasForm');
            const statusMsg = document.getElementById('statusMessage');
            const saveBtn = document.getElementById('saveAliasBtn');
            const tbody = document.getElementById('aliasTableBody');

            function loadAliases() {
                fetch('/api/aliases')
                    .then(res => res.json())
                    .then(data => {
                        tbody.innerHTML = '';
                        if (Object.keys(data).length === 0) {
                            tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">No aliases added yet.</td></tr>';
                            return;
                        }

                        for (const [address, info] of Object.entries(data)) {
                            const isHidden = info.is_hidden;
                            const statusBadge = isHidden ? '<span class="badge danger">Muted</span>' : '<span class="badge success">Active</span>';

                            tbody.innerHTML += `
                                <tr>
                                    <td><span class="badge">${address}</span></td>
                                    <td>${info.alias}</td>
                                    <td>${statusBadge}</td>
                                    <td>
                                        <button class="action-btn delete-btn" onclick="deleteAlias('${address}')">Remove</button>
                                        <button class="action-btn edit-btn" onclick="editAlias('${address}', '${info.alias}', ${isHidden})">Edit</button>
                                    </td>
                                </tr>
                            `;
                        }
                    })
                    .catch(err => console.error("Error fetching:", err));
            }

            window.deleteAlias = function (address) {
                if (!confirm(`Are you sure you want to delete the alias for ${address}?`)) return;

                fetch('/api/aliases', {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ address })
                }).then(res => res.json())
                    .then(data => {
                        if (data.status === 'success') {
                            loadAliases();
                            showStatus('Alias deleted!', 'success');
                        }
                    });
            };

            window.editAlias = function (address, alias, isHidden) {
                document.getElementById('address').value = address;
                document.getElementById('alias').value = alias;
                document.getElementById('is_hidden').checked = isHidden;
            };

            loadAliases();

            form.addEventListener('submit', (e) => {
                e.preventDefault();
                saveBtn.innerText = 'Saving...';
                saveBtn.disabled = true;

                const payload = {
                    address: document.getElementById('address').value,
                    alias: document.getElementById('alias').value,
                    is_hidden: document.getElementById('is_hidden').checked
                };

                fetch('/api/aliases', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                })
                    .then(res => res.json())
                    .then(data => {
                        if (data.status === 'success') {
                            showStatus('Alias saved!', 'success');
                            loadAliases();
                            document.getElementById('address').value = '';
                            document.getElementById('alias').value = '';
                            document.getElementById('is_hidden').checked = false;
                        } else {
                            showStatus('Something went wrong: ' + data.message, 'error');
                        }
                    })
                    .finally(() => {
                        saveBtn.innerText = 'Save Alias';
                        saveBtn.disabled = false;
                    });
            });

            function showStatus(text, type) {
                statusMsg.innerText = text;
                statusMsg.className = `status-message ${type} show`;
                setTimeout(() => {
                    statusMsg.classList.remove('show');
                }, 5000);
            }
        });
    </script>
</body>

</html>
