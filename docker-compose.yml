services:
  pagermonitor:
    # Use the image generated by GitHub actions, or build locally for testing
    # image: ghcr.io/minglarn/pagermonitor:latest
    build: .
    container_name: pagermonitor
    restart: unless-stopped
    devices:
      # Map the USB devices for RTL-SDR to work (uncomment on Linux host)
      - /dev/bus/usb:/dev/bus/usb
    volumes:
      - ./data:/app/data
    environment:
      - MQTT_BROKER=192.168.1.121
      - MQTT_PORT=1883
      - MQTT_USER=home-assistant-server
      - MQTT_PASS=${MQTT_PASS:-}
      - MQTT_TOPIC=${MQTT_TOPIC:-pagermonitor/alarms}
      - TZ=${TZ:-Europe/Stockholm}
    ports:
      - "5000:5000"
