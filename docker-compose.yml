version: '3.8'

services:
  pagermonitor:
    # Use the image generated by GitHub actions, or build locally for testing
    # image: ghcr.io/minglarn/pagermonitor:latest
    build: .
    container_name: pagermonitor
    restart: unless-stopped
    devices:
      # Map the USB devices for RTL-SDR to work
      - /dev/bus/usb:/dev/bus/usb
    volumes:
      - ./data:/app/data
    environment:
      # Set RTL_TCP_ADDRESS if you want to use rtl_tcp instead of a local USB device
      # Example: RTL_TCP_ADDRESS=192.168.1.10:1234
      - RTL_TCP_ADDRESS=
      - MQTT_BROKER=192.168.1.121
      - MQTT_PORT=1883
      - MQTT_USER=your_username
      - MQTT_PASS=your_password
    ports:
      - "5000:5000"
